{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
</head>
<body class="login-body">

    <div class="login-container">
        <div class="login-card">
            <h1> Bienvenido al sistema de gestion de la estacion meteorologica G3</h1>
            <h2>Ingresa tus credenciales para acceder de forma segura al panel de control</h2>

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label>Usuario</label>
                    {{ form.username }}
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    {{ form.password }}
                </div>

                <button type="submit" class="login-btn">Iniciar sesion</button>
            </form>
        </div>
    </div>

</body>
</html>
