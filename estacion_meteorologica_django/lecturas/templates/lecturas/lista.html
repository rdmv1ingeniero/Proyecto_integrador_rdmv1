{% extends 'base.html' %}

{% block content %}

<h1>Lecturas Meteorológicas</h1>

<div class="cards">
    <div class="card">🌡 Temperatura</div>
    <div class="card">💧 Humedad</div>
    <div class="card">🌧 Lluvia</div>
    <div class="card">🌬 Viento</div>
</div>

<table id="tablaLecturas">
    <tr>
        <th>ID</th>
        <th>Sensor</th>
        <th>Valor</th>
        <th>Fecha</th>
    </tr>
</table>

<script>
function actualizarLecturas() {
    fetch('/api/lecturas/')
        .then(response => response.json())
        .then(data => {
            let tabla = document.getElementById("tablaLecturas");

            tabla.innerHTML = `
                <tr>
                    <th>ID</th>
                    <th>Sensor</th>
                    <th>Valor</th>
                    <th>Fecha</th>
                </tr>
            `;

            data.lecturas.forEach(lectura => {
                tabla.innerHTML += `
                    <tr>
                        <td>${lectura.id}</td>
                        <td>${lectura.sensor}</td>
                        <td>${lectura.valor}</td>
                        <td>${lectura.fecha}</td>
                    </tr>
                `;
            });
        });
}

setInterval(actualizarLecturas, 3000);

actualizarLecturas();
</script>

{% endblock %}
