{% extends 'base.html' %}

{% block content %}

<h1>Lecturas Meteorológicas</h1>

<div class="cards">
    <div class="card">🌡 Temperatura</div>
    <div class="card">💧 Humedad</div>
    <div class="card">🌧 Lluvia</div>
    <div class="card">🌬 Viento</div>
</div>

<table>
    <tr>
        <th>ID</th>
        <th>Sensor</th>
        <th>Valor</th>
        <th>Fecha</th>
    </tr>

    {% for lectura in page_obj %}
    <tr>
        <td>{{ lectura.id }}</td>
        <td>{{ lectura.sensor }}</td>
        <td>{{ lectura.valor }}</td>
        <td>{{ lectura.fecha }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
